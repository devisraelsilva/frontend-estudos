    <title>Tags</title>

  <body>
    <h1>tags em HTML</h1>
    <p>
      Em HTML, podemos inserir os elementos da lista a seguir. Passe o mouse
      sobre os termos para descobrir qual tag deverá utilizar em cada caso.
    </p>
    <ul>
      <li><abbr title="Utilizando a TAG &lt;P&gt;">Parágrafo</abbr></li>
      <li><abbr title="Utilizando a TAG &lt;H&gt;">Títulos</abbr></li>
      <li><abbr title="Utilizando a TAG &lt;IMG&gt;">Imagens</abbr></li>
      <li><abbr title="Utilizando a TAG &lt;A&gt;">Links</abbr></li>
      <li><abbr title="Utilizando a TAG &lt;CODE&gt;">Código-Fonte</abbr></li>
      <li><abbr title="Utilizando a TAG &lt;OL&gt;">Listas Ordenadas</abbr></li>
      <li>
        <abbr title="Utilizando a TAG &lt;UL&gt;">Listas não ordenadas</abbr>
      </li>
      <li><abbr title="Utilizando a TAG &lt;MARK&gt;">Marca texto</abbr></li>
    </ul>
  </body>
